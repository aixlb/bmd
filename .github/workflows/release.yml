name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action 需要创建 Release 与上传产物
permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run check:version
      - run: npm ci
      - run: npx vue-tsc --noEmit
      - run: npx vitest run
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon + Intel 通用包各出一份
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest # NSIS 安装包（WebView2 downloadBootstrapper）
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'bmd ${{ github.ref_name }}'
          releaseDraft: true
          args: ${{ matrix.args }}

      # 绿色便携版（仅 Windows）：单 exe 免安装，zip 后上传到同一个 draft Release
      - name: 打包并上传绿色便携版
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = '${{ github.ref_name }}'.TrimStart('v')
          $dir = "bmd_${ver}_x64-portable"
          New-Item -ItemType Directory $dir | Out-Null
          Copy-Item src-tauri/target/release/bmd.exe "$dir/bmd.exe"
          @(
            'bmd 绿色便携版（免安装）'
            ''
            '1. 解压后双击 bmd.exe 即可使用。'
            '2. 需要系统已装 WebView2 运行时（Windows 10/11 一般自带；缺失时请装微软官方 Evergreen 运行时，或改用安装版）。'
            '3. 便携版不注册 .md 文件关联；想在「打开方式」里选 bmd 请使用安装版。'
            '4. 设置与数据保存在 %APPDATA%\com.aixlb.bmd（与安装版共用）。'
          ) | Set-Content "$dir\说明.txt" -Encoding utf8
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          gh release upload '${{ github.ref_name }}' "$dir.zip" --clobber --repo ${{ github.repository }}
